name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libappindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install LLVM and Clang (macOS only)
        if: matrix.platform == 'macos-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set environment variables (macOS only)
        if: matrix.platform == 'macos-latest'
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Set environment variables (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Write signing key to file
        shell: bash
        run: |
          printf '%s' "${{ secrets.TAURI_PRIVATE_KEY }}" > /tmp/tauri_signing_key
          chmod 600 /tmp/tauri_signing_key
          echo "Key written, size: $(wc -c < /tmp/tauri_signing_key) bytes"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: /tmp/tauri_signing_key
          MACOSX_DEPLOYMENT_TARGET: '10.15'
          CMAKE_OSX_DEPLOYMENT_TARGET: '10.15'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '8voice ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See the commit history for changes in this release.

            ## Install
            Download the installer for your platform from the assets below:
            - **Windows**: `.msi`
            - **macOS**: `.dmg` (universal — works on Intel and Apple Silicon)
            - **Linux**: `.AppImage` or `.deb`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload updater artifacts and manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Determine Tauri updater target(s) for this platform
          targets=()
          case "${{ runner.os }}" in
            Windows)  targets=("windows-x86_64") ;;
            macOS)    targets=("darwin-x86_64" "darwin-aarch64") ;;
            Linux)    targets=("linux-x86_64") ;;
          esac

          # Find updater archive + sig files (tar.gz, msi.zip, nsis.zip, app.tar.gz)
          shopt -s nullglob
          shopt -s globstar
          search_root="."

          # On macOS universal build the bundles live under target/universal-apple-darwin
          if [ -d "src-tauri/target/universal-apple-darwin/release/bundle" ]; then
            search_root="src-tauri/target/universal-apple-darwin/release/bundle"
          elif [ -d "src-tauri/target/release/bundle" ]; then
            search_root="src-tauri/target/release/bundle"
          fi

          archive=""
          sig=""

          # Prefer updater-specific archives
          for f in "$search_root"/**/*.{tar.gz,zip}; do
            case "$f" in
              *.app.tar.gz|*.nsis.zip|*.msi.zip|*.AppImage.tar.gz)
                archive="$f"
                ;;
            esac
          done
          [ -z "$archive" ] && archive=$(ls "$search_root"/**/*.tar.gz 2>/dev/null | head -1)
          [ -z "$archive" ] && archive=$(ls "$search_root"/**/*.zip 2>/dev/null | head -1)

          if [ -n "$archive" ]; then
            sig="${archive}.sig"
            if [ ! -f "$sig" ]; then
              sig="${archive%.tar.gz}.tar.gz.sig"
              [ ! -f "$sig" ] && sig="${archive%.zip}.zip.sig"
            fi
          fi
          [ ! -f "$sig" ] && sig=$(ls "$search_root"/**/*.sig 2>/dev/null | head -1)

          if [ -z "$archive" ]; then
            echo "::warning::No updater archive found — skipping upload"
            exit 0
          fi

          version="${GITHUB_REF_NAME#v}"
          archive_name=$(basename "$archive")

          # Upload the updater archive + sig first
          echo "Uploading $archive_name..."
          for i in 1 2 3 4 5; do
            if gh release upload "${{ github.ref_name }}" "$archive" --clobber 2>/dev/null; then break; fi
            sleep 5
          done
          if [ -f "$sig" ]; then
            sig_name=$(basename "$sig")
            echo "Uploading $sig_name..."
            for i in 1 2 3 4 5; do
              if gh release upload "${{ github.ref_name }}" "$sig" --clobber 2>/dev/null; then break; fi
              sleep 5
            done
            signature=$(cat "$sig")
          else
            signature=""
          fi

          # Create per-target JSON manifests
          for target in "${targets[@]}"; do
            cat > "$target.json" <<EOJSON
          {
            "version": "$version",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$archive_name",
            "signature": "$signature"
          }
          EOJSON

            for i in 1 2 3 4 5; do
              if gh release upload "${{ github.ref_name }}" "$target.json" --clobber 2>/dev/null; then
                echo "Uploaded $target.json"
                break
              fi
              sleep 5
            done
          done
